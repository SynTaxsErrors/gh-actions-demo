name: helloWorld
env:
 APP_NAME: "Demo Application"

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/*"
  pull_request:
     branches: [main]
  repository_dispatch:
    types: ["after_rendered_cms"]

jobs:
  echo-vars:
   runs-on: ubuntu-latest
   steps:
    - name: Echo Github Variable
      env:
       APP_VERSION: "1.0.0"
       RUNNER_CONTEXT: ${{toJson(runner)}}
      run: 
       echo "trigger by ${{github.event_name}}"
       echo "repo by ${{github.repository}}"
       echo "ref-name by ${{github.ref_name}}"
       echo "APP ':' ${{env.APP_NAME}} ':' version ':' ${{env.APP_VERSION}}"
       echo "$RUNNER_CONTEXT"
       echo "THE EIEI is ${{secrets.EIEI}}"

  hello-job:
    if: ${{github.event.client_Payload.statoos != 'comploote'}}
    runs-on: ubuntu-latest

    steps:
      - name: Run a one-line script
        run: echo "Hello GitHub Actions."
        
      - name: Retrive c p l
        run: echo "Client Send Status ':' ${{github.event.client_Payload.status}}"
             echo "Client Send Statoos ':' ${{github.event.client_Payload.statoos}}"
             echo "Client Send event_name ':' ${{github.event_name}}"


  second-job:
    if: ${{github.event.client_Payload.statoos != 'comploote'}}
    runs-on: windows-latest
    needs: hello-job

    steps:
      - run: echo "This job running on ${{ runner.os }}"
     
