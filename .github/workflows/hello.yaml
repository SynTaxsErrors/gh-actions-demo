name: helloWorld

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Run a one-line script
        run: echo "Hello GitHub Actions."

  second-job:
    runs-on: windows-latest
    needs: hello-job

    steps:
      - run: echo "This job running on ${{ runner.os }}"
